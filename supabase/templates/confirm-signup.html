<!--
  Supabase → Authentication → Email Templates → "Confirm signup".
  Paste the markup below into the template body. Subject: "Verify your Inkubus account".
  {{ .ConfirmationURL }} is filled in by Supabase with the real verify link.
  Inline styles only (email clients strip <style>/<head>). No remote images
  (broken-image + spam risk) — the wordmark is text.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#17120f;margin:0;padding:32px 0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background:#1f1814;border:1px solid #3d2c22;border-radius:14px;overflow:hidden;">
        <tr>
          <td style="padding:28px 32px 8px;">
            <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#ff7a18;font-weight:700;">Inkubus</div>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 0;">
            <h1 style="margin:0 0 12px;font-size:22px;line-height:1.3;color:#f2e9e2;">Confirm your account</h1>
            <p style="margin:0 0 8px;font-size:15px;line-height:1.6;color:#b9a89c;">
              Welcome. Inkubus is waiting — and he's owed words. Confirm your email to start your streak.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px;">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;background:#ff7a18;color:#1b1208;text-decoration:none;font-weight:700;font-size:15px;padding:13px 26px;border-radius:8px;">
              Verify my account
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 32px 8px;">
            <p style="margin:0 0 6px;font-size:12px;line-height:1.6;color:#8a766a;">
              Button not working? Paste this link into your browser:
            </p>
            <p style="margin:0;font-size:12px;line-height:1.5;word-break:break-all;">
              <a href="{{ .ConfirmationURL }}" style="color:#ff7a18;">{{ .ConfirmationURL }}</a>
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 32px 28px;border-top:1px solid #3d2c22;">
            <p style="margin:18px 0 0;font-size:12px;line-height:1.6;color:#8a766a;">
              If you didn't create a Inkubus account, you can safely ignore this email.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
